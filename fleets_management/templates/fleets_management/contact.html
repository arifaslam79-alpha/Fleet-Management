{% extends "fleets_management/base.html" %}
{% load static %}  
{% block title %}Contact Us{% endblock %}
{% block content %}
<div class="content">
	<div class="container_12">
		<div class="grid_12">
			<h3>Find Us</h3>
			<div class="map">
				<figure>
					{{ data.iframe_code|safe }}
				</figure>
			</div>
		</div>
		<div class="grid_5">
			{{ data.description|safe }}
		</div>
		<div class="grid_6 prefix_1">
			<h3>Contact Form</h3>
			<form id="form" method="post" action="/ccontact-form">
			{% csrf_token %}
				<div class="success_wrapper">
					<div class="success-message">Contact form submitted</div>
				</div>
				<label class="name">
					<input type="text" placeholder="Name:" name="name" data-constraints="@Required @JustLetters" />
					<span class="empty-message">*This field is required.</span>
					<span class="error-message">*This is not a valid name.</span>
				</label>
				<label class="email">
					<input type="text" name="email" placeholder="E-mail:" data-constraints="@Required @Email" />
					<span class="empty-message">*This field is required.</span>
					<span class="error-message">*This is not a valid email.</span>
				</label>
				<label class="phone">
					<input type="text" name="phone" placeholder="Phone:" data-constraints="@Required @JustNumbers"/>
					<span class="empty-message">*This field is required.</span>
					<span class="error-message">*This is not a valid phone.</span>
				</label>
				<label class="message">
					<textarea name="message" placeholder="Message:" data-constraints='@Required @Length(min=20,max=999999)'></textarea>
					<span class="empty-message">*This field is required.</span>
					<span class="error-message">*The message is too short.</span>
				</label>
				<div>
					<div class="clear"></div>
					<div class="btns">
						<a href="#" data-type="submit" class="btn">Send</a>
						<a href="#" data-type="reset" class="btn">Clear</a>
					</div>
				</div>
			</form>
		</div>
		<div class="clear"></div>
	</div>
</div>
{% endblock content %}
